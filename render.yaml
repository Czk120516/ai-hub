services:
  - type: web
    name: ai-hub
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_NAME
        sync: false
